services:
  investment-decision-bot:
    build: .
    container_name: investment-decision-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      DATABASE_PROVIDER: Sqlite
      DATABASE_PATH: /app/data/investment-decision-bot.db
      TIME_ZONE: ${TIME_ZONE:-Asia/Tokyo}
      REPORT_TIME: ${REPORT_TIME:-08:00}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      MARKET_DATA_ENABLED: ${MARKET_DATA_ENABLED:-false}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      ALPHAVANTAGE_FETCH_ON_REPORT: ${ALPHAVANTAGE_FETCH_ON_REPORT:-false}
      ALPHAVANTAGE_DAILY_REQUEST_LIMIT: ${ALPHAVANTAGE_DAILY_REQUEST_LIMIT:-25}
      ALPHAVANTAGE_MIN_REQUEST_INTERVAL_MS: ${ALPHAVANTAGE_MIN_REQUEST_INTERVAL_MS:-1000}
    volumes:
      - bot-data:/app/data

volumes:
  bot-data:
